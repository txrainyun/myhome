<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人导航站</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-compass"></i> 我的个人导航</h1>
            <p class="subtitle">快速访问您喜欢的网站</p>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索网站...">
            <i class="fas fa-search search-icon"></i>
        </div>

        <nav class="category-nav">
            <button class="category-btn active" data-category="all">全部</button>
        </nav>

        <main id="linksContainer" class="links-grid">
        </main>

        <footer>
            <p>使用 ❤️ 制作 | <a href="https://github.com" target="_blank">GitHub Pages 部署</a></p>
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
