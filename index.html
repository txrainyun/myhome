<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人导航</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-compass"></i>
                    </div>
                    <h1>我的个人导航</h1>
                </div>
                <p class="greeting" id="greeting"></p>
            </div>
            
            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" placeholder="搜索书签...">
                </div>
            </div>
            
            <nav class="category-nav" id="categoryNav"></nav>
            
            <div class="header-actions">
                <button class="btn-add" id="btnAddBookmark" title="添加新书签">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </header>

        <main id="linksContainer" class="links-grid"></main>
        
        <div class="time-display" id="timeDisplay"></div>
        
        <footer class="footer">
            <p>使用 ❤️ 制作 | 点击编辑书签</p>
        </footer>
    </div>
    
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-bookmark"></i> 添加新书签</h2>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <form id="addBookmarkForm">
                <div class="form-group">
                    <label for="bookmarkName">名称</label>
                    <input type="text" id="bookmarkName" placeholder="网站名称" required>
                </div>
                <div class="form-group">
                    <label for="bookmarkUrl">网址</label>
                    <input type="url" id="bookmarkUrl" placeholder="https://example.com" required>
                </div>
                <div class="form-group">
                    <label for="bookmarkDesc">描述</label>
                    <input type="text" id="bookmarkDesc" placeholder="简短描述">
                </div>
                <div class="form-group">
                    <label for="bookmarkCategory">分类</label>
                    <select id="bookmarkCategory">
                        <option value="AI 工具">AI 工具</option>
                        <option value="编程开发">编程开发</option>
                        <option value="影视追剧">影视追剧</option>
                        <option value="游戏专区">游戏专区</option>
                        <option value="学习教育">学习教育</option>
                        <option value="实用工具">实用工具</option>
                        <option value="社交娱乐">社交娱乐</option>
                        <option value="工作相关">工作相关</option>
                        <option value="阅读小说">阅读小说</option>
                        <option value="设计素材">设计素材</option>
                        <option value="安全/其他">安全/其他</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" id="cancelAdd">取消</button>
                    <button type="submit" class="btn-submit"><i class="fas fa-check"></i> 添加</button>
                </div>
            </form>
        </div>
    </div>
    
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-edit"></i> 编辑书签</h2>
                <button class="modal-close" id="closeEditModal">&times;</button>
            </div>
            <form id="editBookmarkForm">
                <input type="hidden" id="editIndex">
                <input type="hidden" id="editCategoryIndex">
                <div class="form-group">
                    <label for="editBookmarkName">名称</label>
                    <input type="text" id="editBookmarkName" required>
                </div>
                <div class="form-group">
                    <label for="editBookmarkUrl">网址</label>
                    <input type="url" id="editBookmarkUrl" required>
                </div>
                <div class="form-group">
                    <label for="editBookmarkDesc">描述</label>
                    <input type="text" id="editBookmarkDesc">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" id="cancelEdit">取消</button>
                    <button type="submit" class="btn-submit"><i class="fas fa-save"></i> 保存</button>
                    <button type="button" class="btn-delete" id="deleteBookmark"><i class="fas fa-trash"></i> 删除</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
